name: Test GitHub Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test image
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          convert -size 100x100 xc:gray +noise gaussian test-image.png

      - name: Run ASCII Converter Action
        id: convert
        uses: ./
        with:
          path: test-image.png
          width: '40'
          height: '20'
          output-path: output

      - name: Verify output exists
        run: |
          test -f output/test-image.txt
          echo "Output file created successfully"
          head -5 output/test-image.txt

      - name: Verify action outputs
        run: |
          test -n "${{ steps.convert.outputs.ascii }}"
          test -n "${{ steps.convert.outputs.output-files }}"
          echo "Action outputs set correctly"
